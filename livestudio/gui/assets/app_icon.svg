<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff2f8"/>
      <stop offset="100%" stop-color="#ff8fc4"/>
    </linearGradient>
    <radialGradient id="recGrad" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#ff6b8f"/>
      <stop offset="100%" stop-color="#e8285c"/>
    </radialGradient>
    <filter id="recShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#c21b47" flood-opacity="0.45"/>
    </filter>
    <filter id="softLift" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#d9558f" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect x="8" y="8" width="184" height="184" rx="44" fill="url(#bg)"/>

  <!-- WiFi 信号：先在未旋转状态下让几何中心精确落在(100,100)，再整体旋转45° -->
  <g transform="rotate(45 100 100)" filter="url(#softLift)">
    <!-- 圆点（现在位于左下角方向） -->
    <circle cx="100" cy="140.5" r="11" fill="#ffffff"/>
    <!-- 内弧 -->
    <path d="M 73.2 118.0 A 35 35 0 0 1 126.8 118.0"
          fill="none" stroke="#ffffff" stroke-width="19"
          stroke-linecap="round" opacity="1"/>
    <!-- 中弧 -->
    <path d="M 51.7 100.0 A 63 63 0 0 1 148.3 100.0"
          fill="none" stroke="#ffffff" stroke-width="17"
          stroke-linecap="round" opacity="0.82"/>
    <!-- 外弧 -->
    <path d="M 31.0 82.6 A 90 90 0 0 1 169.0 82.6"
          fill="none" stroke="#ffffff" stroke-width="15"
          stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- 录制按钮 -->
  <circle cx="148" cy="148" r="30" fill="#ffffff"/>
  <circle cx="148" cy="148" r="25" fill="url(#recGrad)" filter="url(#recShadow)"/>
</svg>